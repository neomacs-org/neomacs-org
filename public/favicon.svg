<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400" role="img" aria-labelledby="title desc">
  <title id="title">NEO Emacs taijitu window icon</title>
  <desc id="desc">Blue and orange taijitu mark with two centrosymmetric lambda symbols.</desc>

  <defs>
    <filter id="softShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity="0.42"/>
    </filter>
  </defs>

  <g transform="scale(10)" filter="url(#softShadow)">
    <circle cx="20" cy="20" r="20" fill="#07101a" opacity="0.62"/>
    <circle cx="20" cy="20" r="18.5" fill="#16aee8" stroke="#07101a" stroke-width="1.1"/>
    <path
      d="M20 1.5 a18.5 18.5 0 0 1 0 37 a9.25 9.25 0 0 1 0 -18.5 a9.25 9.25 0 0 0 0 -18.5 Z"
      fill="#ff9900"/>
    <circle cx="20" cy="20" r="18.5" fill="none" stroke="#d7f6ff" stroke-opacity="0.34" stroke-width="0.42"/>
    <text
      x="16"
      y="18"
      text-anchor="middle"
      font-size="16.5"
      font-weight="700"
      fill="#0d0d12"
      font-family="JetBrains Mono, Cascadia Code, Menlo, Consolas, monospace"
      transform="rotate(225 16 12)">λ</text>
    <text
      x="16"
      y="18"
      text-anchor="middle"
      font-size="16.5"
      font-weight="700"
      fill="#0d0d12"
      font-family="JetBrains Mono, Cascadia Code, Menlo, Consolas, monospace"
      transform="rotate(180 20 20) rotate(225 16 12)">λ</text>
  </g>
</svg>
