<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-labelledby="title desc">
  <title id="title">Neomacs Window Icon</title>
  <desc id="desc">Rounded square icon with a stylized E glyph and neon accents.</desc>

  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#091a2a"/>
      <stop offset="52%" stop-color="#11243a"/>
      <stop offset="100%" stop-color="#121a2f"/>
    </linearGradient>

    <linearGradient id="frameGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3dd9ff"/>
      <stop offset="100%" stop-color="#ffb760"/>
    </linearGradient>

    <linearGradient id="markGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6df2ff"/>
      <stop offset="55%" stop-color="#9effbf"/>
      <stop offset="100%" stop-color="#ffd37a"/>
    </linearGradient>

    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(148 136) rotate(28) scale(210 160)">
      <stop offset="0%" stop-color="#00d7ff" stop-opacity="0.34"/>
      <stop offset="100%" stop-color="#00d7ff" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(372 366) rotate(-24) scale(210 170)">
      <stop offset="0%" stop-color="#ffb760" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#ffb760" stop-opacity="0"/>
    </radialGradient>

    <pattern id="dotGrid" width="18" height="18" patternUnits="userSpaceOnUse">
      <circle cx="1.6" cy="1.6" r="1.2" fill="#9bc0df" fill-opacity="0.2"/>
    </pattern>

    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="deepShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#030810" flood-opacity="0.6"/>
    </filter>
  </defs>

  <rect x="24" y="24" width="464" height="464" rx="112" fill="url(#bgGrad)" stroke="url(#frameGrad)" stroke-width="4" filter="url(#deepShadow)"/>
  <rect x="24" y="24" width="464" height="464" rx="112" fill="url(#dotGrid)" opacity="0.42"/>
  <rect x="24" y="24" width="464" height="464" rx="112" fill="url(#glowA)"/>
  <rect x="24" y="24" width="464" height="464" rx="112" fill="url(#glowB)"/>

  <rect x="72" y="72" width="368" height="368" rx="90" fill="#0b1728" fill-opacity="0.4" stroke="#77d8ff" stroke-opacity="0.2" stroke-width="2"/>

  <circle cx="256" cy="256" r="144" fill="none" stroke="#73e8ff" stroke-opacity="0.18" stroke-width="3"/>
  <circle cx="256" cy="256" r="122" fill="none" stroke="#ffca7a" stroke-opacity="0.16" stroke-width="3"/>

  <path d="M152 125H360V175H206V231H336V279H206V337H360V387H152Z"
        fill="url(#markGrad)"
        filter="url(#softGlow)"/>
  <path d="M152 125H360V175H206V231H336V279H206V337H360V387H152Z"
        fill="none"
        stroke="#d6fbff"
        stroke-opacity="0.32"
        stroke-width="2"/>

  <g filter="url(#softGlow)">
    <circle cx="98" cy="420" r="3" fill="#78ecff"/>
    <circle cx="412" cy="96" r="3" fill="#ffc36c"/>
    <circle cx="390" cy="428" r="2.4" fill="#9dffc2"/>
    <circle cx="120" cy="106" r="2.4" fill="#8ce9ff"/>
  </g>
</svg>
